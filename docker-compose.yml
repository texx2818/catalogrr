services:
  catalogrr:
    build:
      context: ./backend
    container_name: catalogrr
    ports:
      - "4120:4120"
    volumes:
      - catalogrr-data:/data
    restart: unless-stopped
    environment:
      - PORT=4120
      - DB_PATH=/data/catalogrr.db
      - RAWG_API_KEY=your_key_here

volumes:
  catalogrr-data:
